# JVM args — Compose builds are memory-hungry.
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseParallelGC
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=false

# AndroidX
android.useAndroidX=true
android.nonTransitiveRClass=true

# Kotlin
kotlin.code.style=official

# AgentCore base URL — overridden at install time via local.properties
# or the BuildConfig field below. Default points to the production
# Reflex endpoint defined in IC-1.
reflex.agentcore.baseUrl=https://reflex.agenomics.xyz

# Solana cluster — devnet for hackathon, mainnet-beta for production.
reflex.solana.cluster=devnet
reflex.solana.rpcUrl=https://api.devnet.solana.com
