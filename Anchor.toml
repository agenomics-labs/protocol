[programs.localnet]
agent_registry = "26KETQPxeMmbakxpVbUEpQBQmVgpabHAweTHBRgBHjW7"
agent_vault = "D2y1dEi4dj1pcxw6GvkFWX34RRbuFJCaGWdPNJAasQ5q"
cctp_hook = "MtqZaquyJCMu1ph8CygpKBQECfAkH2gig7TUtYXdWdC"
settlement = "AwjdsNvhR2uwPNbU6F2fsYB33VcNGL5XaANdgsyvZDia"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/settlement.ts tests/agent-registry.ts tests/agent-vault.ts tests/cpi-failures.test.ts tests/cctp-hook.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = true

[test.validator]
# Default gossip port 8000 (and 8001) collide with an unrelated service
# already running on the shared dev host — solana-test-validator would
# otherwise panic at startup with "Address already in use" and every
# anchor-integration/anchor-test run would silently fail before any test
# executes. Pinned to a free port found via `ss -tln`.
gossip_port = 18000
# Anchor injects `--bind-address` once this table is present; 0.0.0.0 makes
# gossip's external-IP resolution panic (UnspecifiedIpAddr). Local-only test
# validator, so bind to loopback explicitly.
bind_address = "127.0.0.1"
