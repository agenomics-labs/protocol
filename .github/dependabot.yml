# Dependabot configuration — implements ADR-114
# Three ecosystems: cargo, npm (workspace root + leaf services), github-actions.
# Weekly cadence, labeled `dependencies`, direct-only updates, security patches
# grouped into one PR per ecosystem per week. Ignore list: minimal — applied
# only to documented major-bump waves with a tracking issue per ADR-114
# §"Ignore list" (amended 2026-05-12); see issue #149 for the active tracker.
# No auto-merge — every PR goes through the normal CI gate; revisit once
# ADR-115 lands.
# References:
#   - docs/adr/ADR-114-dependabot-dependency-hygiene.md
#   - docs/adr/ADR-089-reproducible-installs.md (lockfile canon — drives
#     versioning-strategy choice below)
#   - docs/adr/ADR-115-ci-blocking-security-gates.md (companion gate)

version: 2
updates:
  # ---------------------------------------------------------------------------
  # Cargo workspace — root Cargo.toml + on-chain programs
  # (agent-registry, agent-vault, settlement). Workspace inheritance means a
  # single root entry covers transitive program crates; their Cargo.toml files
  # do not need their own Dependabot entries.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    reviewers:
      - "agenomics-labs/core"
    # GitHub's dependabot schema accepts only `auto` or `lockfile-only` for
    # cargo (npm still accepts `increase`). `auto` keeps the spirit of
    # ADR-114 (root workspace bumps Cargo.toml when a direct-dep range
    # demands it) while satisfying the schema. See ADR-114 amendment.
    versioning-strategy: "auto"
    # Direct-only — no transitive churn noise.
    allow:
      - dependency-type: "direct"
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"

  # ---------------------------------------------------------------------------
  # npm — root workspace
  # versioning-strategy: increase (per ADR-089, root workspace bumps lockfile)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    reviewers:
      - "agenomics-labs/core"
    versioning-strategy: "increase"
    allow:
      - dependency-type: "direct"
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"

  # ---------------------------------------------------------------------------
  # npm — leaf services (versioning-strategy: increase-if-necessary, so leaf
  # lockfile pins are preserved unless a security/range bump forces a change)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/mcp-server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
