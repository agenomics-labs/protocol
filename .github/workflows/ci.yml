name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-check:
    name: Rust Check & Test
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)

      - name: Verify preinstalled Rust toolchain
        # ADR-105: self-hosted runner ships with stable + nightly toolchains
        # under ~/.rustup. Anchor's IDL build needs both; do not re-install
        # via dtolnay/rust-toolchain which would hide nightly behind a fresh
        # RUSTUP_HOME and break `anchor idl build`.
        run: |
          rustup show
          rustc --version
          cargo --version
          rustup toolchain list

      - name: Cache cargo registry & build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # pin v5 (AUD-406)
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cargo check (all programs)
        run: cargo check --workspace

      - name: Cargo test (unit + fuzz)
        run: cargo test --workspace

      # Finding #22: clippy runs advisory-only for now. The workspace has
      # ~30 pre-existing warnings (mostly from anchor-generated code) that
      # would flood CI if clippy was gated on -D warnings. Emit the lint
      # report visibly; tighten the gate once the known-clean baseline lands.
      - name: Cargo clippy (advisory)
        run: cargo clippy --workspace --all-targets
        continue-on-error: true

  security-audit:
    name: Security Audit
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)

      - name: Verify preinstalled Rust toolchain
        # ADR-105: self-hosted runner ships with stable + nightly toolchains
        # under ~/.rustup. Anchor's IDL build needs both; do not re-install
        # via dtolnay/rust-toolchain which would hide nightly behind a fresh
        # RUSTUP_HOME and break `anchor idl build`.
        run: |
          rustup show
          rustc --version
          cargo --version
          rustup toolchain list

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # pin v5 (AUD-406)
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-audit-

      # Finding #22: cargo-audit scans Cargo.lock against the RustSec
      # advisory DB. Runs advisory-only so a new advisory against a
      # transitive dep doesn't block unrelated PRs — but is visible.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true

      - name: Run cargo audit
        run: cargo audit
        continue-on-error: true

  # ADR-089: npm workspaces + committed unified lockfile + `npm ci` everywhere.
  # A single `npm ci` at the workspace root installs every workspace member's
  # deps into a hoisted node_modules tree. Subsequent jobs all run from a fresh
  # checkout, so each one re-runs `npm ci` (it is the lockfile-pinned, no-write
  # equivalent of `npm install`).
  typescript-check-mcp:
    name: TypeScript Check (mcp-server)
    runs-on: [self-hosted, linux]
    # ADR-088: mcp-server's tsc resolves Anchor IDL types through the
    # `src/idl/types.d.ts` re-export shim, which points at
    # `target/types/*.ts` — a build artifact of `anchor-build`. We wait
    # for that job, download the `anchor-types` artifact, and place it
    # under `target/types/` before running `tsc --noEmit`.
    needs: anchor-build
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"
          cache: "npm"

      # `npm ci` at the workspace root installs every workspace member.
      # No per-workspace `npm install` invocations needed.
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund

      - name: Download Anchor-generated TS types
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin v8 (AUD-406)
        with:
          name: anchor-types
          path: target/types

      # mcp-server consumes @agenomics/capability-manifest-validator,
      # @agenomics/sas-resolver, and @agenomics/action-runtime via `file:`
      # deps. tsc --noEmit in mcp-server needs the d.ts output from those
      # packages, so build them first. action-runtime is built before
      # sas-resolver because PR-T (AUD-013) made sas-resolver re-export from
      # action-runtime.
      - name: Build @agenomics/action-runtime
        run: npm run build --workspace @agenomics/action-runtime

      - name: Build @agenomics/capability-manifest-validator
        run: npm run build --workspace @agenomics/capability-manifest-validator

      - name: Build @agenomics/sas-resolver
        run: npm run build --workspace @agenomics/sas-resolver

      - name: Type check
        working-directory: mcp-server
        run: npx tsc --noEmit

      # ADR-083 — fail the build if anyone wires app.listen / server.listen
      # under mcp-server/src/** outside the auth-gated wrapper.
      - name: MCP transport auth gate (ADR-083)
        run: ./scripts/check-mcp-transport-auth.sh

      # Finding #22: npm audit at `high` severity. Runs advisory-only for
      # the same reason cargo-audit does — a newly disclosed issue should
      # be visible without torpedoing unrelated PRs. Workspace-aware.
      - name: npm audit (high)
        run: npm audit --audit-level=high --workspaces --include-workspace-root
        continue-on-error: true

  # Finding #22: the indexer lives in `src/indexer/` with its own package.json
  # and was not type-checked by CI. Discriminator regressions and event
  # decoder bugs surfaced as runtime failures because nothing caught them
  # at build time.
  typescript-check-indexer:
    name: TypeScript Check (indexer)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund
      - name: Type check
        working-directory: src/indexer
        run: npx tsc --noEmit

  # Finding #22: same gap for the x402 relay.
  # AUD-402: also runs the npm test suite — gates the JWT_SECRET length-floor
  # regression (`test/jwt-secret-length.test.ts`) added in cycle-2 audit
  # closure. The suite spawns `tsx index.ts` as a child process per case so
  # it has no need for solana-test-validator and stays scoped to the
  # workspace `npm test` job (NOT `anchor test`).
  typescript-check-x402-relay:
    name: TypeScript Check + Tests (x402-relay)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund
      - name: Type check
        working-directory: src/x402-relay
        run: npx tsc --noEmit
      - name: Unit tests (node:test + tsx)
        run: npm test --workspace @agenomics/x402-relay

  # Added alongside the `packages/*` TS packages introduced with ADR-060
  # (`@agenomics/capability-manifest-validator`) and ADR-064 (`@agenomics/sas-resolver`).
  # Each package is self-contained (own package.json + tsconfig + tests under
  # node:test + tsx) and must pass type-check and unit tests independently.
  typescript-check-validator:
    name: TypeScript Check (capability-manifest-validator)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund
      # capability-manifest-validator now depends on @agenomics/action-runtime
      # (PR-T completion / AUD-201 / commit 66b7240). Build action-runtime
      # first so its d.ts is on disk for the typecheck.
      - name: Build @agenomics/action-runtime
        run: npm run build --workspace @agenomics/action-runtime
      - name: Type check
        working-directory: packages/capability-manifest-validator
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test --workspace @agenomics/capability-manifest-validator

  typescript-check-sas-resolver:
    name: TypeScript Check (sas-resolver)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund
      # sas-resolver depends on capability-manifest-validator (runtime) and
      # @agenomics/action-runtime (PR-T / AUD-013 — re-exports Result/ok/err).
      # Build both before typecheck/test.
      - name: Build @agenomics/action-runtime
        run: npm run build --workspace @agenomics/action-runtime
      - name: Build @agenomics/capability-manifest-validator
        run: npm run build --workspace @agenomics/capability-manifest-validator
      - name: Type check
        working-directory: packages/sas-resolver
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test --workspace @agenomics/sas-resolver

  # Three SDK packages (`sdk/idl`, `sdk/action-runtime`, `sdk/client`) ship
  # their own `npm test` (node:test + tsx, self-contained — no validator,
  # no anchor IDL artifacts needed). They were workspace members but had
  # no CI gate, so a regression in any of the three could land silently.
  # Added as three independent jobs so a failure in `idl` doesn't mask a
  # failure in `client`. Mirror the validator/sas-resolver pattern.
  typescript-check-sdk-idl:
    name: TypeScript Check (sdk/idl)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund
      - name: Type check
        working-directory: sdk/idl
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test --workspace @agenomics/idl

  typescript-check-sdk-action-runtime:
    name: TypeScript Check (sdk/action-runtime)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund
      - name: Type check
        working-directory: sdk/action-runtime
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test --workspace @agenomics/action-runtime

  typescript-check-sdk-client:
    name: TypeScript Check (sdk/client)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund
      # sdk/client depends on @agenomics/idl (PROGRAM_IDS export consumed
      # by client.ts). Build idl first so its d.ts is on disk for the
      # typecheck. Mirrors the validator → action-runtime build-first pattern.
      - name: Build @agenomics/idl
        run: npm run build --workspace @agenomics/idl
      - name: Type check
        working-directory: sdk/client
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test --workspace @agenomics/client

  # Dashboard is the only workspace member that's pure JSX (no .ts) and has
  # no test suite. Gating on `vite build` is the cheapest signal that
  # catches import errors, JSX syntax errors, and module-resolution breaks
  # — all of which were silent before this gate. Build is fast (~500ms
  # local) and produces no committed artifacts (dist/ is gitignored).
  dashboard-build:
    name: Dashboard build (vite)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund
      - name: Vite production build
        run: npm run build --workspace dashboard

  # mcp-server also has pipeline + action-shape tests under node:test + tsx
  # (see `test/*.test.ts`). The existing `typescript-check-mcp` job only runs
  # `npx tsc --noEmit`; add a separate `npm test` invocation so the 70+ unit
  # tests block regressions.
  mcp-server-tests:
    name: mcp-server unit tests
    runs-on: [self-hosted, linux]
    # ADR-088: same Anchor-types dependency as `typescript-check-mcp`.
    # The new `idl-typed-decode.test.ts` exercises the typed
    # `IdlAccounts<AgentRegistry>["agentProfile"]` shape, which only
    # resolves once `target/types/agent_registry.ts` is on disk.
    needs: anchor-build
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"
          cache: "npm"
      - name: Download Anchor-generated TS types
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin v8 (AUD-406)
        with:
          name: anchor-types
          path: target/types
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund
      # Build the @agenomics/* packages so the `file:` deps + tsx ESM loader
      # can resolve their dist/*.js at test runtime. action-runtime is built
      # first so sas-resolver (which re-exports from it post PR-T / AUD-013)
      # has its types resolvable.
      - name: Build @agenomics/action-runtime
        run: npm run build --workspace @agenomics/action-runtime
      - name: Build @agenomics/capability-manifest-validator
        run: npm run build --workspace @agenomics/capability-manifest-validator
      - name: Build @agenomics/sas-resolver
        run: npm run build --workspace @agenomics/sas-resolver
      - name: Unit tests (node:test + tsx)
        run: npm test --workspace @agenomics/mcp-server

  # AUD-408: workspace-build-order check. PR-T introduced
  # `@agenomics/action-runtime` as a sas-resolver dep but no CI job
  # exercised the workspace build order from a clean install — the
  # missing build dep was caught only after CI broke on commits 8fb8511
  # and 71b4a87. This job runs `npm ci` from a clean state, then
  # `npm run build --workspaces --if-present` (which builds in
  # package.json declaration order), and finally a tsc smoke pass on
  # the four downstream typecheck targets. A regression where a
  # downstream workspace is added before its build-time deps will fail
  # here in a single job rather than in three different ones.
  workspace-build-order:
    name: Workspace build-order check
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"
          cache: "npm"
      - name: Clean install
        run: |
          rm -rf node_modules
          npm ci --no-audit --no-fund
      - name: Build all workspaces in topo order
        run: |
          # `npm run build --workspaces` builds in package.json declaration
          # order; this job verifies that order satisfies the dep DAG.
          npm run build --workspaces --if-present
      - name: Run typechecks (smoke)
        run: |
          for ws in mcp-server packages/sas-resolver packages/capability-manifest-validator src/indexer; do
            (cd "$ws" && npx tsc --noEmit)
          done

  # ADR-089 §5: lockfile-determinism gate. Verifies `npm ci` from a fresh
  # clone produces output identical to the committed lockfile. If a developer
  # edits package.json without running `npm install` (which would update the
  # lockfile), this job fails — preventing lockfile drift.
  lockfile-determinism:
    name: Lockfile determinism check
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"
      - name: npm ci from clean clone (must match lockfile exactly)
        run: |
          # `npm ci` exits non-zero if package.json and package-lock.json
          # disagree — that is the gate. We additionally snapshot the
          # lockfile hash before/after to surface any silent rewrites.
          before=$(sha256sum package-lock.json | awk '{print $1}')
          npm ci --no-audit --no-fund
          after=$(sha256sum package-lock.json | awk '{print $1}')
          if [ "$before" != "$after" ]; then
            echo "::error::package-lock.json was rewritten by npm ci. Run 'npm install' locally and commit the result."
            diff <(echo "$before") <(echo "$after") || true
            exit 1
          fi
          echo "Lockfile sha256 stable across npm ci: $after"

  # 2026-05-06: tool-parity gate. The 27-tool inventory exists on three
  # surfaces (mcp-server allTools[], dashboard MCP_TOOLS, README MCP Tools
  # section); drift between them caused multiple PRs of fix-up work in the
  # submission-readiness sweep (notably PR #80 where the dashboard had a
  # stale 25-tool list with 5 names that didn't exist in mcp-server). This
  # job ensures the bug class can't recur silently.
  tool-parity:
    name: Tool parity check (mcp-server ↔ dashboard ↔ README)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - name: Run tool parity check
        run: bash scripts/check-tools-parity.sh

  # 2026-05-06: license-parity gate. ADR-136 (Apache-2.0) shipped via PR #76,
  # but completing the propagation across every workspace package.json + every
  # on-chain program Cargo.toml took four follow-up PRs (#79, #82, #87, #88).
  # Each fix only surfaced when a different audit looked at a different file.
  # This gate makes a missing-license-field bug class non-recurring.
  license-parity:
    name: License parity check (Apache-2.0 across workspaces + programs)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - name: Run license parity check
        run: bash scripts/check-license-parity.sh

  # 2026-05-06: doc-commands lint. PRs #79, #80, #82 each fixed user-facing
  # docs that told judges to `npm install @agenomics/...` (the scope is
  # source-only — every install command 404s). PR #85 fixed `npx ts-node`
  # references where `tsx` is the actual workspace dep. This gate catches
  # both bug classes inline on every PR diff.
  doc-commands-lint:
    name: Doc-commands lint (executable instructions in user docs)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - name: Run doc-commands lint
        run: bash scripts/check-doc-commands.sh

  # 2026-05-06: program-ID parity gate. The 3 on-chain program IDs appear
  # in 6+ surfaces (Anchor.toml, README, SUBMISSION, SUMMARY, dashboard,
  # JUDGE_RUNBOOK). Source of truth is `declare_id!` in each
  # programs/*/src/lib.rs — that's what gets baked into the BPF binary.
  # Drift between declare_id! and downstream surfaces means the published
  # docs advertise a program that the deployed binary doesn't match.
  # Highest-stakes possible drift; gate added prophylactically.
  program-ids-parity:
    name: Program-ID parity check (declare_id! ↔ docs ↔ dashboard)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - name: Run program-ID parity check
        run: bash scripts/check-program-ids.sh

  # 2026-05-06: ADR cross-reference gate. With 134+ ADRs and heavy
  # cross-referencing, a typo'd ADR-NNN reference silently misdirects
  # readers; a reference to a not-yet-merged ADR (proposed in a draft PR)
  # silently breaks once the doc lands on main. The audit that built this
  # gate found 4 real broken refs (ADR-138/139/140 from PR #68 wave,
  # ADR-057 deliberately skipped) — the script's allowlist captures these
  # as known-intentional, and any new broken ref fails CI.
  adr-refs:
    name: ADR cross-reference check
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - name: Run ADR cross-reference check
        run: bash scripts/check-adr-refs.sh

  # 2026-05-06: markdown-link gate. Judges clicking through user-facing
  # docs hit immediate "this is unfinished" signals when links 404. The
  # audit that built this script found 3 real broken links in
  # docs/index.md (vitepress-style `/path` works on the live site but
  # 404s on GitHub web view) — fixed in the PR that added this gate.
  md-links:
    name: Markdown link check (relative file paths)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
      - name: Run markdown link check
        run: bash scripts/check-md-links.sh

  # S-xcut-05: mandatory secret-scan gate. A leaked on-chain private key
  # has direct blast radius against the protocol's authorities, so this
  # is blocking (no `continue-on-error`). Full-history scan on push to
  # main; diff-only on PRs to keep PR latency low.
  secret-scan:
    name: Secret Scan
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)
        with:
          # TruffleHog needs the commit history to diff against `base`.
          fetch-depth: 0

      - name: TruffleHog (PR diff)
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/trufflehog # vendored composite — see .github/actions/trufflehog/UPSTREAM (AUD-406)
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --results=verified,unknown

      - name: TruffleHog (full history on main)
        if: github.event_name == 'push'
        uses: ./.github/actions/trufflehog # vendored composite — see .github/actions/trufflehog/UPSTREAM (AUD-406)
        with:
          path: ./
          extra_args: --results=verified,unknown

  # S-xcut-03: anchor build + IDL diff gate.
  #
  # `cargo check` does not exercise Anchor IDL codegen. H1 from the prior
  # critique (fabricated discriminators in the indexer) was an IDL-drift
  # failure that a mandatory anchor build + committed-IDL diff would have
  # caught. This job rebuilds every program, diffs the generated IDL
  # against `idl/*.json` in the tree, and uploads the IDL as an artifact
  # so maintainers can seed the baseline on first run.
  anchor-build:
    name: Anchor Build & IDL Diff
    runs-on: [self-hosted, linux]
    env:
      # Agave 3.1.13 ships platform-tools v1.52 (Rust 1.89 + cargo 1.89),
      # which is the first Solana/Agave release whose bundled cargo can
      # parse v4 lockfiles and handle `edition2024` transitive deps that
      # appear in our current tree. Anchor 0.31.1 builds cleanly against
      # it (verified locally). Older 1.18 / 2.x releases ship cargo 1.75
      # and fail at `anchor build` with either `lock file version 4
      # requires -Znext-lockfile-bump` or `feature edition2024 is
      # required`.
      SOLANA_VERSION: v3.1.13
      ANCHOR_VERSION: 0.31.1
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)

      - name: Verify preinstalled Rust toolchain
        # ADR-105: self-hosted runner ships with stable + nightly toolchains
        # under ~/.rustup. Anchor's IDL build needs both; do not re-install
        # via dtolnay/rust-toolchain which would hide nightly behind a fresh
        # RUSTUP_HOME and break `anchor idl build`.
        run: |
          rustup show
          rustc --version
          cargo --version
          rustup toolchain list

      - name: Cache cargo registry & target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # pin v5 (AUD-406)
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-anchor-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-anchor-cargo-

      - name: Cache solana CLI
        id: cache-solana
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # pin v5 (AUD-406)
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Verify Solana toolchain
        run: |
          solana --version
          cargo-build-sbf --version

      - name: Cache anchor CLI
        id: cache-anchor
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # pin v5 (AUD-406)
        with:
          path: ~/.cargo/bin/anchor
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}

      - name: Install Anchor CLI
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --force \
            --tag "v${ANCHOR_VERSION}" anchor-cli --locked

      - name: Verify Anchor
        run: anchor --version

      - name: Anchor build
        env:
          RUST_BACKTRACE: full
        run: |
          set -x
          anchor build
          echo "--- target/idl contents after build ---"
          ls -la target/idl || echo "(no target/idl directory)"

      - name: Upload generated IDL
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pin v7 (AUD-406)
        with:
          name: anchor-idl
          path: target/idl/*.json
          if-no-files-found: warn

      # ADR-088: mcp-server's tsc consumes target/types/*.ts (the camelCase
      # TypeScript view of the IDL that Anchor 0.31 generates) via the
      # mcp-server/src/idl/types.d.ts re-export shim. Downstream
      # TypeScript jobs depend on this artifact so they don't have to
      # repeat the full anchor-build (~6-10 min) themselves.
      - name: Upload generated Anchor TS types
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pin v7 (AUD-406)
        with:
          name: anchor-types
          path: target/types/*.ts
          if-no-files-found: warn

      - name: Check IDL matches committed baseline
        run: ./scripts/check-idl.sh

  # S-xcut-04: integration test job against a local solana-test-validator.
  #
  # Runs the Anchor test suites under `tests/` (settlement / agent-registry /
  # agent-vault) against a freshly-deployed local validator that
  # `anchor test` spins up per run. The suites were aligned with the
  # post-refactor programs (ADR-025 .. ADR-060) under the S-xcut-04
  # follow-up; 99/99 pass locally against the current programs on
  # Anchor 0.31.1 + Solana 3.1.13.
  #
  # `needs: anchor-build` means this job waits for the IDL-diff gate to
  # pass — avoids re-running a full test cycle if IDL drift is already
  # detected. Toolchain install mirrors anchor-build exactly so cache keys
  # are shared; Solana/Anchor versions come from the same pinned env vars.
  anchor-integration:
    name: Anchor Integration Tests
    runs-on: [self-hosted, linux]
    needs: anchor-build
    # ADR-105 self-hosted runners share one host — solana-test-validator
    # binds RPC port 8899 by default, so two anchor-test jobs in parallel
    # collide with "Error: Your configured rpc port: 8899 is already in
    # use". A host-wide concurrency group serializes them across PRs.
    # cancel-in-progress: false — never kill a half-finished test run;
    # queue the next one instead.
    concurrency:
      group: anchor-integration-host
      cancel-in-progress: false
    env:
      SOLANA_VERSION: v3.1.13
      ANCHOR_VERSION: 0.31.1
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)

      - name: Verify preinstalled Rust toolchain
        # ADR-105: self-hosted runner ships with stable + nightly toolchains
        # under ~/.rustup. Anchor's IDL build needs both; do not re-install
        # via dtolnay/rust-toolchain which would hide nightly behind a fresh
        # RUSTUP_HOME and break `anchor idl build`.
        run: |
          rustup show
          rustc --version
          cargo --version
          rustup toolchain list

      - name: Cache cargo registry & target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # pin v5 (AUD-406)
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-anchor-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-anchor-cargo-

      - name: Cache solana CLI
        id: cache-solana
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # pin v5 (AUD-406)
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Verify Solana toolchain
        run: |
          solana --version
          cargo-build-sbf --version

      - name: Cache anchor CLI
        id: cache-anchor
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # pin v5 (AUD-406)
        with:
          path: ~/.cargo/bin/anchor
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}

      - name: Install Anchor CLI
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --force \
            --tag "v${ANCHOR_VERSION}" anchor-cli --locked

      - name: Verify Anchor
        run: anchor --version

      - name: Generate local validator keypair
        # `solana-test-validator` (spawned by `anchor test`) needs a wallet
        # at the provider path declared in Anchor.toml
        # (`~/.config/solana/id.json`). Fresh CI runners don't have one.
        run: |
          mkdir -p "$HOME/.config/solana"
          if [ ! -f "$HOME/.config/solana/id.json" ]; then
            solana-keygen new --no-bip39-passphrase --force -o "$HOME/.config/solana/id.json"
          fi

      - name: Install npm test deps
        # ADR-089: workspace lockfile is committed; use `npm ci` for
        # bit-identical installs across CI runs.
        run: npm ci --no-audit --no-fund

      - name: Anchor test (solana-test-validator + ts-mocha)
        env:
          RUST_BACKTRACE: full
        run: |
          set -x
          anchor test

  # Historical note (superseded by `anchor-integration` above):
  # pre-S-xcut-04 the tests/ suites predated the C1..C4 refactors that
  # rewrote escrow, dispute, reputation, and registry CPIs — 14 of 99
  # tests were failing against the post-refactor programs. Rather than
  # gate unrelated PRs on a broken suite, the integration job was left
  # out of CI until the suite was aligned. S-xcut-04 aligned the tests
  # with the current program contracts (ADR-025 .. ADR-060) and the
  # job above is the live gate.
