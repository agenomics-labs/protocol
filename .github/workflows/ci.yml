name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-check:
    name: Rust Check & Test
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v5

      - name: Verify preinstalled Rust toolchain
        # ADR-105: self-hosted runner ships with stable + nightly toolchains
        # under ~/.rustup. Anchor's IDL build needs both; do not re-install
        # via dtolnay/rust-toolchain which would hide nightly behind a fresh
        # RUSTUP_HOME and break `anchor idl build`.
        run: |
          rustup show
          rustc --version
          cargo --version
          rustup toolchain list

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cargo check (all programs)
        run: cargo check --workspace

      - name: Cargo test (unit + fuzz)
        run: cargo test --workspace

      # Finding #22: clippy runs advisory-only for now. The workspace has
      # ~30 pre-existing warnings (mostly from anchor-generated code) that
      # would flood CI if clippy was gated on -D warnings. Emit the lint
      # report visibly; tighten the gate once the known-clean baseline lands.
      - name: Cargo clippy (advisory)
        run: cargo clippy --workspace --all-targets
        continue-on-error: true

  security-audit:
    name: Security Audit
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v5

      - name: Verify preinstalled Rust toolchain
        # ADR-105: self-hosted runner ships with stable + nightly toolchains
        # under ~/.rustup. Anchor's IDL build needs both; do not re-install
        # via dtolnay/rust-toolchain which would hide nightly behind a fresh
        # RUSTUP_HOME and break `anchor idl build`.
        run: |
          rustup show
          rustc --version
          cargo --version
          rustup toolchain list

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-audit-

      # Finding #22: cargo-audit scans Cargo.lock against the RustSec
      # advisory DB. Runs advisory-only so a new advisory against a
      # transitive dep doesn't block unrelated PRs — but is visible.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true

      - name: Run cargo audit
        run: cargo audit
        continue-on-error: true

  # ADR-089: npm workspaces + committed unified lockfile + `npm ci` everywhere.
  # A single `npm ci` at the workspace root installs every workspace member's
  # deps into a hoisted node_modules tree. Subsequent jobs all run from a fresh
  # checkout, so each one re-runs `npm ci` (it is the lockfile-pinned, no-write
  # equivalent of `npm install`).
  typescript-check-mcp:
    name: TypeScript Check (mcp-server)
    runs-on: [self-hosted, linux]
    # ADR-088: mcp-server's tsc resolves Anchor IDL types through the
    # `src/idl/types.d.ts` re-export shim, which points at
    # `target/types/*.ts` — a build artifact of `anchor-build`. We wait
    # for that job, download the `anchor-types` artifact, and place it
    # under `target/types/` before running `tsc --noEmit`.
    needs: anchor-build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # `npm ci` at the workspace root installs every workspace member.
      # No per-workspace `npm install` invocations needed.
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund

      - name: Download Anchor-generated TS types
        uses: actions/download-artifact@v4
        with:
          name: anchor-types
          path: target/types

      # mcp-server consumes @agenomics/capability-manifest-validator and
      # @agenomics/sas-resolver via `file:` deps. tsc --noEmit in mcp-server
      # needs the d.ts output from those packages, so build them first.
      - name: Build @agenomics/capability-manifest-validator
        run: npm run build --workspace @agenomics/capability-manifest-validator

      - name: Build @agenomics/sas-resolver
        run: npm run build --workspace @agenomics/sas-resolver

      - name: Type check
        working-directory: mcp-server
        run: npx tsc --noEmit

      # ADR-083 — fail the build if anyone wires app.listen / server.listen
      # under mcp-server/src/** outside the auth-gated wrapper.
      - name: MCP transport auth gate (ADR-083)
        run: ./scripts/check-mcp-transport-auth.sh

      # Finding #22: npm audit at `high` severity. Runs advisory-only for
      # the same reason cargo-audit does — a newly disclosed issue should
      # be visible without torpedoing unrelated PRs. Workspace-aware.
      - name: npm audit (high)
        run: npm audit --audit-level=high --workspaces --include-workspace-root
        continue-on-error: true

  # Finding #22: the indexer lives in `src/indexer/` with its own package.json
  # and was not type-checked by CI. Discriminator regressions and event
  # decoder bugs surfaced as runtime failures because nothing caught them
  # at build time.
  typescript-check-indexer:
    name: TypeScript Check (indexer)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund
      - name: Type check
        working-directory: src/indexer
        run: npx tsc --noEmit

  # Finding #22: same gap for the x402 relay.
  typescript-check-x402-relay:
    name: TypeScript Check (x402-relay)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund
      - name: Type check
        working-directory: src/x402-relay
        run: npx tsc --noEmit

  # Added alongside the `packages/*` TS packages introduced with ADR-060
  # (`@agenomics/capability-manifest-validator`) and ADR-064 (`@agenomics/sas-resolver`).
  # Each package is self-contained (own package.json + tsconfig + tests under
  # node:test + tsx) and must pass type-check and unit tests independently.
  typescript-check-validator:
    name: TypeScript Check (capability-manifest-validator)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund
      - name: Type check
        working-directory: packages/capability-manifest-validator
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test --workspace @agenomics/capability-manifest-validator

  typescript-check-sas-resolver:
    name: TypeScript Check (sas-resolver)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund
      # sas-resolver depends on capability-manifest-validator at runtime via
      # @agenomics/* package; both build/test independently but resolver tests
      # need the validator's compiled JS.
      - name: Build @agenomics/capability-manifest-validator
        run: npm run build --workspace @agenomics/capability-manifest-validator
      - name: Type check
        working-directory: packages/sas-resolver
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test --workspace @agenomics/sas-resolver

  # mcp-server also has pipeline + action-shape tests under node:test + tsx
  # (see `test/*.test.ts`). The existing `typescript-check-mcp` job only runs
  # `npx tsc --noEmit`; add a separate `npm test` invocation so the 70+ unit
  # tests block regressions.
  mcp-server-tests:
    name: mcp-server unit tests
    runs-on: [self-hosted, linux]
    # ADR-088: same Anchor-types dependency as `typescript-check-mcp`.
    # The new `idl-typed-decode.test.ts` exercises the typed
    # `IdlAccounts<AgentRegistry>["agentProfile"]` shape, which only
    # resolves once `target/types/agent_registry.ts` is on disk.
    needs: anchor-build
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Download Anchor-generated TS types
        uses: actions/download-artifact@v4
        with:
          name: anchor-types
          path: target/types
      - name: Install workspace deps (npm ci)
        run: npm ci --no-audit --no-fund
      # Build the @agenomics/* packages so the `file:` deps + tsx ESM loader
      # can resolve their dist/*.js at test runtime.
      - name: Build @agenomics/capability-manifest-validator
        run: npm run build --workspace @agenomics/capability-manifest-validator
      - name: Build @agenomics/sas-resolver
        run: npm run build --workspace @agenomics/sas-resolver
      - name: Unit tests (node:test + tsx)
        run: npm test --workspace @agenomics/mcp-server

  # ADR-089 §5: lockfile-determinism gate. Verifies `npm ci` from a fresh
  # clone produces output identical to the committed lockfile. If a developer
  # edits package.json without running `npm install` (which would update the
  # lockfile), this job fails — preventing lockfile drift.
  lockfile-determinism:
    name: Lockfile determinism check
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm ci from clean clone (must match lockfile exactly)
        run: |
          # `npm ci` exits non-zero if package.json and package-lock.json
          # disagree — that is the gate. We additionally snapshot the
          # lockfile hash before/after to surface any silent rewrites.
          before=$(sha256sum package-lock.json | awk '{print $1}')
          npm ci --no-audit --no-fund
          after=$(sha256sum package-lock.json | awk '{print $1}')
          if [ "$before" != "$after" ]; then
            echo "::error::package-lock.json was rewritten by npm ci. Run 'npm install' locally and commit the result."
            diff <(echo "$before") <(echo "$after") || true
            exit 1
          fi
          echo "Lockfile sha256 stable across npm ci: $after"

  # S-xcut-05: mandatory secret-scan gate. A leaked on-chain private key
  # has direct blast radius against the protocol's authorities, so this
  # is blocking (no `continue-on-error`). Full-history scan on push to
  # main; diff-only on PRs to keep PR latency low.
  secret-scan:
    name: Secret Scan
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v5
        with:
          # TruffleHog needs the commit history to diff against `base`.
          fetch-depth: 0

      - name: TruffleHog (PR diff)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --results=verified,unknown

      - name: TruffleHog (full history on main)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown

  # S-xcut-03: anchor build + IDL diff gate.
  #
  # `cargo check` does not exercise Anchor IDL codegen. H1 from the prior
  # critique (fabricated discriminators in the indexer) was an IDL-drift
  # failure that a mandatory anchor build + committed-IDL diff would have
  # caught. This job rebuilds every program, diffs the generated IDL
  # against `idl/*.json` in the tree, and uploads the IDL as an artifact
  # so maintainers can seed the baseline on first run.
  anchor-build:
    name: Anchor Build & IDL Diff
    runs-on: [self-hosted, linux]
    env:
      # Agave 3.1.13 ships platform-tools v1.52 (Rust 1.89 + cargo 1.89),
      # which is the first Solana/Agave release whose bundled cargo can
      # parse v4 lockfiles and handle `edition2024` transitive deps that
      # appear in our current tree. Anchor 0.31.1 builds cleanly against
      # it (verified locally). Older 1.18 / 2.x releases ship cargo 1.75
      # and fail at `anchor build` with either `lock file version 4
      # requires -Znext-lockfile-bump` or `feature edition2024 is
      # required`.
      SOLANA_VERSION: v3.1.13
      ANCHOR_VERSION: 0.31.1
    steps:
      - uses: actions/checkout@v5

      - name: Verify preinstalled Rust toolchain
        # ADR-105: self-hosted runner ships with stable + nightly toolchains
        # under ~/.rustup. Anchor's IDL build needs both; do not re-install
        # via dtolnay/rust-toolchain which would hide nightly behind a fresh
        # RUSTUP_HOME and break `anchor idl build`.
        run: |
          rustup show
          rustc --version
          cargo --version
          rustup toolchain list

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-anchor-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-anchor-cargo-

      - name: Cache solana CLI
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Verify Solana toolchain
        run: |
          solana --version
          cargo-build-sbf --version

      - name: Cache anchor CLI
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anchor
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}

      - name: Install Anchor CLI
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag "v${ANCHOR_VERSION}" anchor-cli --locked

      - name: Verify Anchor
        run: anchor --version

      - name: Anchor build
        env:
          RUST_BACKTRACE: full
        run: |
          set -x
          anchor build
          echo "--- target/idl contents after build ---"
          ls -la target/idl || echo "(no target/idl directory)"

      - name: Upload generated IDL
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anchor-idl
          path: target/idl/*.json
          if-no-files-found: warn

      # ADR-088: mcp-server's tsc consumes target/types/*.ts (the camelCase
      # TypeScript view of the IDL that Anchor 0.31 generates) via the
      # mcp-server/src/idl/types.d.ts re-export shim. Downstream
      # TypeScript jobs depend on this artifact so they don't have to
      # repeat the full anchor-build (~6-10 min) themselves.
      - name: Upload generated Anchor TS types
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anchor-types
          path: target/types/*.ts
          if-no-files-found: warn

      - name: Check IDL matches committed baseline
        run: ./scripts/check-idl.sh

  # S-xcut-04: integration test job against a local solana-test-validator.
  #
  # Runs the Anchor test suites under `tests/` (settlement / agent-registry /
  # agent-vault) against a freshly-deployed local validator that
  # `anchor test` spins up per run. The suites were aligned with the
  # post-refactor programs (ADR-025 .. ADR-060) under the S-xcut-04
  # follow-up; 99/99 pass locally against the current programs on
  # Anchor 0.31.1 + Solana 3.1.13.
  #
  # `needs: anchor-build` means this job waits for the IDL-diff gate to
  # pass — avoids re-running a full test cycle if IDL drift is already
  # detected. Toolchain install mirrors anchor-build exactly so cache keys
  # are shared; Solana/Anchor versions come from the same pinned env vars.
  anchor-integration:
    name: Anchor Integration Tests
    runs-on: [self-hosted, linux]
    needs: anchor-build
    # ADR-105 self-hosted runners share one host — solana-test-validator
    # binds RPC port 8899 by default, so two anchor-test jobs in parallel
    # collide with "Error: Your configured rpc port: 8899 is already in
    # use". A host-wide concurrency group serializes them across PRs.
    # cancel-in-progress: false — never kill a half-finished test run;
    # queue the next one instead.
    concurrency:
      group: anchor-integration-host
      cancel-in-progress: false
    env:
      SOLANA_VERSION: v3.1.13
      ANCHOR_VERSION: 0.31.1
    steps:
      - uses: actions/checkout@v5

      - name: Verify preinstalled Rust toolchain
        # ADR-105: self-hosted runner ships with stable + nightly toolchains
        # under ~/.rustup. Anchor's IDL build needs both; do not re-install
        # via dtolnay/rust-toolchain which would hide nightly behind a fresh
        # RUSTUP_HOME and break `anchor idl build`.
        run: |
          rustup show
          rustc --version
          cargo --version
          rustup toolchain list

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-anchor-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-anchor-cargo-

      - name: Cache solana CLI
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Verify Solana toolchain
        run: |
          solana --version
          cargo-build-sbf --version

      - name: Cache anchor CLI
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anchor
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}

      - name: Install Anchor CLI
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag "v${ANCHOR_VERSION}" anchor-cli --locked

      - name: Verify Anchor
        run: anchor --version

      - name: Generate local validator keypair
        # `solana-test-validator` (spawned by `anchor test`) needs a wallet
        # at the provider path declared in Anchor.toml
        # (`~/.config/solana/id.json`). Fresh CI runners don't have one.
        run: |
          mkdir -p "$HOME/.config/solana"
          if [ ! -f "$HOME/.config/solana/id.json" ]; then
            solana-keygen new --no-bip39-passphrase --force -o "$HOME/.config/solana/id.json"
          fi

      - name: Install npm test deps
        # ADR-089: workspace lockfile is committed; use `npm ci` for
        # bit-identical installs across CI runs.
        run: npm ci --no-audit --no-fund

      - name: Anchor test (solana-test-validator + ts-mocha)
        env:
          RUST_BACKTRACE: full
        run: |
          set -x
          anchor test

  # Historical note (superseded by `anchor-integration` above):
  # pre-S-xcut-04 the tests/ suites predated the C1..C4 refactors that
  # rewrote escrow, dispute, reputation, and registry CPIs — 14 of 99
  # tests were failing against the post-refactor programs. Rather than
  # gate unrelated PRs on a broken suite, the integration job was left
  # out of CI until the suite was aligned. S-xcut-04 aligned the tests
  # with the current program contracts (ADR-025 .. ADR-060) and the
  # job above is the live gate.
