name: ADR Lint

# AUD-053 / AUD-405: real ADR-lint replacing the stats-only
# `status-audit.sh`.
# Authoritative reference: scripts/adr-lint.sh + docs/adr/ADR-TEMPLATE.md.
#
# Path-filtered: only triggers on PRs (and pushes to main) that touch
# `docs/adr/**` or the lint script itself. Keeps PR latency low for
# changes that don't touch ADRs.
#
# Status: BLOCKING (AUD-405). Cycle-1 dedup + cycle-2 status flips
# brought the corpus to a clean state modulo 4 documented benign
# findings (ADR-098/099 same-number-different-files pair + ADR-050
# mega-ADR sections). Those are tracked separately and the regex was
# tightened in PR-Phase-3.5 to accept `Superseded by ADR-NNN-slug` and
# `Superseded by code-evolution`, eliminating the 4 false-positive
# findings the corpus actually uses.

on:
  push:
    branches: [main]
    paths:
      - "docs/adr/**"
      - "scripts/adr-lint.sh"
      - ".github/workflows/adr-lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/adr/**"
      - "scripts/adr-lint.sh"
      - ".github/workflows/adr-lint.yml"

concurrency:
  group: adr-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  adr-lint:
    name: ADR Lint (scripts/adr-lint.sh)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v5

      - name: Run ADR lint
        # Pure-bash check; no external installs needed. Findings print
        # to stderr in `path:line: diagnostic` form. Summary line on
        # stdout. BLOCKING per AUD-405.
        run: |
          chmod +x scripts/adr-lint.sh
          scripts/adr-lint.sh
