name: ADR Lint

# AUD-053 / AUD-405: real ADR-lint replacing the stats-only
# `status-audit.sh`.
# Authoritative reference: scripts/adr-lint.sh + docs/adr/ADR-TEMPLATE.md.
#
# Path-filtered: only triggers on PRs (and pushes to main) that touch
# `docs/adr/**` or the lint script itself. Keeps PR latency low for
# changes that don't touch ADRs.
#
# Status: BLOCKING (AUD-405). Cycle-1 dedup + cycle-2 status flips +
# cycle-3 corpus cleanup brought the corpus to a fully clean state:
#   - ADR-098/099 Superseded variants relocated to docs/adr/superseded/
#     so the duplicate-number prefix no longer appears in the linted set
#     while preserving the historical record.
#   - ADR-050 (mega-ADR with nine sub-decisions) is on the
#     SECTION_CHECK_EXCEPTIONS list in scripts/adr-lint.sh — documented
#     in-script.
# scripts/adr-lint.sh now reports 0 findings; this gate is enforcing.
# Any new finding fails the PR.

on:
  push:
    branches: [main]
    paths:
      - "docs/adr/**"
      - "scripts/adr-lint.sh"
      - ".github/workflows/adr-lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/adr/**"
      - "scripts/adr-lint.sh"
      - ".github/workflows/adr-lint.yml"

concurrency:
  group: adr-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  adr-lint:
    name: ADR Lint (scripts/adr-lint.sh)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin v5 (AUD-406)

      - name: Run ADR lint
        # Pure-bash check; no external installs needed. Findings print
        # to stderr in `path:line: diagnostic` form. Summary line on
        # stdout.
        #
        # BLOCKING: corpus is at 0 findings as of the cycle-3 cleanup
        # commit. Any non-zero exit fails the PR. To debug locally:
        #   bash scripts/adr-lint.sh
        #   bash scripts/adr-lint.sh --check sections   # narrow scope
        # See scripts/adr-lint.sh header for the full list of checks.
        run: |
          chmod +x scripts/adr-lint.sh
          scripts/adr-lint.sh
