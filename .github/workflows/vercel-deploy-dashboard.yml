name: Vercel Deploy (dashboard)

# Auto-deploy of `dashboard/**` (Vite + React) to app.agenomics.xyz on
# push to main. Same pattern as vercel-deploy-{site,docs,mcp}.yml — the
# free-tier Vercel ↔ GitHub integration is unavailable for org repos so
# we drive deploys from a scoped Vercel CLI token.
#
# Reuses the existing VERCEL_TOKEN repo secret + team-level VERCEL_ORG_ID.
# Project ID is the dashboard one from dashboard/.vercel/project.json.
#
# Path-filtered: only fires when dashboard/** (or this workflow itself)
# changes — programs / mcp-server / indexer commits don't trigger.

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/vercel-deploy-dashboard.yml'
  workflow_dispatch: {}

env:
  # From dashboard/.vercel/project.json. Public identifiers, safe to commit.
  VERCEL_PROJECT_ID: prj_QTjacMxC1ZM2MNAI72f77VEk3SWY
  VERCEL_ORG_ID: team_nOESbCSr6hh3fTEXR6Zaoesz

jobs:
  deploy:
    name: Deploy dashboard/ to Vercel production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin v5 (AUD-406)

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"

      - name: Verify VERCEL_TOKEN secret is set
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN repo secret is not set."
            echo "::error::See header comment in vercel-deploy-site.yml for setup."
            exit 1
          fi
          echo "Secret present (token length: ${#TOKEN} chars)"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project environment
        working-directory: dashboard
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build dashboard for production
        working-directory: dashboard
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt to Vercel production
        working-directory: dashboard
        run: |
          set -euo pipefail
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "Deployment URL: $DEPLOY_URL"
          echo "::notice::Vercel dashboard deploy completed: $DEPLOY_URL"
          echo "::notice::Production alias: https://app.agenomics.xyz"
