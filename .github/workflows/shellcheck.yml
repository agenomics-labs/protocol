name: ShellCheck

# Mandatory static-analysis gate for every shell script under scripts/.
# Authoritative reference: docs/adr/ADR-080-mainnet-deploy-safety-mandates.md §7.
#
# This workflow is BLOCKING. A failing run prevents merge. The system
# `shellcheck` package from Ubuntu's archive is used (not a third-party
# action) so the critical-path workflow has minimal supply-chain surface.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: shellcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck (scripts/*.sh)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        # Self-hosted runner has no passwordless sudo. Use the upstream
        # static binary under ~/.local/bin (already on the runner PATH).
        # No-op if already present at the pinned version.
        run: |
          set -euo pipefail
          TARGET_VERSION=v0.10.0
          if ! command -v shellcheck >/dev/null 2>&1 \
              || [ "$(shellcheck --version | awk '/^version:/ {print "v"$2}')" != "$TARGET_VERSION" ]; then
            mkdir -p "$HOME/.local/bin"
            cd /tmp
            curl -sSL "https://github.com/koalaman/shellcheck/releases/download/${TARGET_VERSION}/shellcheck-${TARGET_VERSION}.linux.x86_64.tar.xz" \
              | tar -xJ
            install -m 0755 "shellcheck-${TARGET_VERSION}/shellcheck" "$HOME/.local/bin/shellcheck"
            rm -rf "shellcheck-${TARGET_VERSION}"
          fi
          shellcheck --version

      - name: Run shellcheck on scripts/*.sh
        # --severity=warning: info/style noise filtered out (ADR-080 §7).
        # --external-sources: follow `source` directives if any are added.
        # No `continue-on-error` — this is a blocking gate.
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(scripts/*.sh)
          if (( ${#files[@]} == 0 )); then
            echo "No shell scripts found under scripts/. Nothing to check."
            exit 0
          fi
          echo "Checking ${#files[@]} script(s):"
          printf "  %s\n" "${files[@]}"
          shellcheck --severity=warning --external-sources "${files[@]}"

      - name: Self-test mainnet-deploy.sh
        # Exercises the script's gate logic without invoking solana CLI.
        # Per ADR-080 §6, this is the smoke test that guarantees gate-logic
        # changes do not silently break the script-load path.
        run: |
          chmod +x scripts/mainnet-deploy.sh
          scripts/mainnet-deploy.sh --self-test
