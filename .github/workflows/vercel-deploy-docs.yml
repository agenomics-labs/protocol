name: Vercel Deploy (docs)

# Auto-deploy of `docs/**` (VitePress) to docs.agenomics.xyz on push
# to main, mirroring the site/ pattern in vercel-deploy-site.yml.
#
# Why this workflow exists:
# Vercel ↔ GitHub auto-deploy is gated to Vercel Pro+ for org repos
# (agenomics-labs is org-owned), so the dashboard-side Git integration
# is unavailable on free tier. Deploy Hooks ALSO require a connected
# Git project. The free-tier workaround is the same as for the site:
# invoke Vercel CLI from GitHub Actions with a scoped API token.
# Confirmed working for the `site` project — see the comment block at
# the top of vercel-deploy-site.yml for the one-time secret setup.
#
# Reuses the existing VERCEL_TOKEN repo secret and the team's
# VERCEL_ORG_ID. Only VERCEL_PROJECT_ID differs (the `docs` project
# id, sourced from docs/.vercel/project.json).
#
# Path-filtered: only fires when docs/** (or this workflow itself)
# changes. Unrelated commits (programs, mcp-server, indexer, site)
# don't trigger a docs build.
#
# Runs on ubuntu-latest, not the self-hosted runner — `npx vercel` is
# the only thing needed and has no Solana/Anchor toolchain dependency,
# so deploys keep working when the self-hosted runner is offline.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/vercel-deploy-docs.yml'
  workflow_dispatch: {}

env:
  # From docs/.vercel/project.json. Not secrets — public identifiers.
  VERCEL_PROJECT_ID: prj_w4XhHjzL7YVtQo9am2rc7sUatGyv
  VERCEL_ORG_ID: team_nOESbCSr6hh3fTEXR6Zaoesz

jobs:
  deploy:
    name: Deploy docs/ to Vercel production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin v5 (AUD-406)

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"

      - name: Verify VERCEL_TOKEN secret is set
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN repo secret is not set."
            echo "::error::See the comment block at the top of"
            echo "::error::.github/workflows/vercel-deploy-site.yml for"
            echo "::error::one-time setup instructions (Vercel token + GitHub secret)."
            exit 1
          fi
          echo "Secret present (token length: ${#TOKEN} chars)"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project environment
        working-directory: docs
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build docs for production
        working-directory: docs
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt to Vercel production
        working-directory: docs
        run: |
          set -euo pipefail
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "Deployment URL: $DEPLOY_URL"
          echo "::notice::Vercel deploy completed: $DEPLOY_URL"
          echo "::notice::Production alias: https://docs.agenomics.xyz"
