name: Vercel Deploy (site)

# ADR-134 Issue C — auto-deploy of `site/**` on push to main, bypassing
# the Vercel ↔ GitHub integration requirement. That integration is
# gated to Vercel Pro+ for org repos, which is incompatible with our
# current free tier. Vercel Deploy Hooks are free-tier-available and
# achieve the same outcome (push → production deploy of HEAD) via a
# per-project URL we curl from CI.
#
# One-time setup (do this once, then `git push` deploys):
#   1. Vercel dashboard → site project → Settings → Git → Deploy Hooks
#      → "Create Hook". Name: `github-main`. Branch: `main`.
#      Copy the resulting URL — it looks like
#      https://api.vercel.com/v1/integrations/deploy/<id>/<token>
#   2. GitHub repo → Settings → Secrets and variables → Actions →
#      "New repository secret". Name: VERCEL_DEPLOY_HOOK_URL.
#      Value: the Deploy Hook URL from step 1.
#   3. Push any change under `site/**` → this workflow fires → Vercel
#      enqueues a production build of HEAD with `source: "deploy-hook"`.
#
# If the secret is not set, the workflow fails fast with an explicit
# message (rather than a confusing curl error). That makes the missing
# setup obvious on the first push.
#
# Path-filtered: only fires when site/** (or this workflow itself)
# changes, so unrelated commits (indexer, mcp-server, docs) don't burn
# a Vercel build.
#
# Runs on `ubuntu-latest` (not the self-hosted runner) by design — this
# is a 1-second curl with no AEP toolchain dependency. Independence
# from the self-hosted runner means deploys still fire even if that
# runner is offline. Cost on GitHub-hosted minutes is negligible.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/vercel-deploy-site.yml'
  workflow_dispatch: {}

jobs:
  trigger-vercel-deploy:
    name: Trigger Vercel deploy hook
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify VERCEL_DEPLOY_HOOK_URL secret is set
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${HOOK:-}" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL repo secret is not set."
            echo "::error::See the comment block at the top of"
            echo "::error::.github/workflows/vercel-deploy-site.yml for"
            echo "::error::one-time setup instructions (Vercel Deploy Hook"
            echo "::error::+ GitHub Actions secret)."
            exit 1
          fi
          echo "Secret present (URL length: ${#HOOK} chars)"

      - name: Trigger Vercel deploy
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          # Vercel's Deploy Hook returns 201 with a small JSON payload
          # containing the new deployment ID. Anything outside 2xx means
          # the hook itself failed (bad URL, revoked, project deleted).
          response=$(curl -sS -X POST -w "\nHTTP_STATUS:%{http_code}\n" "$HOOK")
          status=$(echo "$response" | awk -F: '/^HTTP_STATUS:/ {print $2}')
          body=$(echo "$response" | sed '/^HTTP_STATUS:/d')
          echo "Vercel response status: $status"
          echo "Vercel response body: $body"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Deploy Hook returned non-2xx status $status"
            echo "::error::Most likely causes: hook URL revoked or project moved."
            echo "::error::Recreate the hook in Vercel dashboard and update the secret."
            exit 1
          fi
          # Surface the new deployment URL/id in the run summary if the
          # response contained one (Vercel returns {job: {id, ...}}).
          echo "::notice::Vercel deploy enqueued successfully (HTTP $status)"
          echo "::notice::Track the build at https://vercel.com/k2jac9s-projects/site/deployments"
