name: Vercel Deploy (site)

# ADR-134 Issue C — auto-deploy of `site/**` on push to main, bypassing
# the Vercel ↔ GitHub integration requirement. That integration is
# gated to Vercel Pro+ for org repos, which is incompatible with our
# current free tier. Deploy Hooks (the simpler workaround) ALSO
# require a connected Git project, so they're blocked too.
#
# Working approach: invoke Vercel CLI from GitHub Actions with a
# scoped API token. This is exactly what `cd site && vercel --prod`
# does locally — uploads the working tree directly to Vercel. No Git
# connection needed on the Vercel side.
#
# One-time setup (do this once, then `git push` deploys):
#   1. Vercel dashboard → Account Settings → Tokens → "Create Token"
#      - Name: `github-actions-site`
#      - Scope: `k2jac9's projects` (the team that owns the site)
#      - Expiration: choose what you're comfortable with (1 year is
#        a reasonable default; rotate via this same UI)
#      Copy the token immediately — Vercel only shows it once.
#   2. GitHub repo → Settings → Secrets and variables → Actions →
#      "New repository secret". Name: VERCEL_TOKEN. Value: the token
#      from step 1.
#   3. Push any change under `site/**` → this workflow fires →
#      Vercel CLI deploys the working tree to production.
#
# If the secret is not set, the workflow fails fast with an explicit
# message rather than a confusing CLI error. That makes the missing
# setup obvious on the first push.
#
# Project identifiers (VERCEL_PROJECT_ID, VERCEL_ORG_ID) are NOT
# secrets — they're public identifiers visible in Vercel dashboard
# URLs. They live in `site/.vercel/project.json` locally (which is
# gitignored), so we hardcode them in the env block below to avoid a
# `vercel link` step in CI.
#
# Path-filtered: only fires when site/** (or this workflow itself)
# changes, so unrelated commits (indexer, mcp-server, docs) don't
# burn a Vercel build.
#
# Runs on `ubuntu-latest` (not the self-hosted runner) by design —
# this is `npx vercel`, no AEP toolchain dependency. Independence
# from the self-hosted runner means deploys still fire even if that
# runner is offline. Negligible GitHub-hosted minute cost.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/vercel-deploy-site.yml'
  workflow_dispatch: {}

env:
  # From site/.vercel/project.json. Not secrets — public identifiers.
  VERCEL_PROJECT_ID: prj_67FRSC0Yyill3zqFUX0z44593l3c
  VERCEL_ORG_ID: team_nOESbCSr6hh3fTEXR6Zaoesz

jobs:
  deploy:
    name: Deploy site/ to Vercel production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin v5 (AUD-406)

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6 (AUD-406)
        with:
          node-version: "20"

      - name: Verify VERCEL_TOKEN secret is set
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN repo secret is not set."
            echo "::error::See the comment block at the top of"
            echo "::error::.github/workflows/vercel-deploy-site.yml for"
            echo "::error::one-time setup instructions (Vercel token + GitHub secret)."
            exit 1
          fi
          echo "Secret present (token length: ${#TOKEN} chars)"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project environment
        working-directory: site
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build site for production
        working-directory: site
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt to Vercel production
        working-directory: site
        run: |
          set -euo pipefail
          # `vercel deploy --prebuilt --prod` uploads the .vercel/output
          # directory produced by the build step above and aliases the
          # production domains. Captures the deployment URL for the run
          # summary so the operator can click through to verify.
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "Deployment URL: $DEPLOY_URL"
          echo "::notice::Vercel deploy completed: $DEPLOY_URL"
          echo "::notice::Production aliases: https://agenomics.xyz, https://www.agenomics.xyz"
